services:
  postgres:
    image: postgres:16-alpine
    container_name: notify-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atugusto}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-atugusto}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notify-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8090
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/${POSTGRES_DB:-atugusto}
      SPRING_R2DBC_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_R2DBC_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      META_WHATSAPP_TOKEN: ${META_WHATSAPP_TOKEN:-}
      META_WHATSAPP_VERIFY_TOKEN: ${META_WHATSAPP_VERIFY_TOKEN:-mi_token_seguro}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${APP_PORT:-8090}:8090"
    restart: unless-stopped

volumes:
  postgres_data:

